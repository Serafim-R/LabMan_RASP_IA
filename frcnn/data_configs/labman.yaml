# Images and labels direcotry should be relative to train.py
TRAIN_DIR_LABELS: /data/labman_pascal_voc/archive/train/annotations
TRAIN_DIR_IMAGES: /data/labman_pascal_voc/archive/train/images
VALID_DIR_IMAGES: /data/labman_pascal_voc/archive/valid/images
VALID_DIR_LABELS: /data/labman_pascal_voc/archive/valid/annotations
# Optional test data path. If given, test paths (data) will be used in
# `eval.py`.
TEST_DIR_IMAGES: /data/labman_pascal_voc/archive/test/images
TEST_DIR_LABELS: /data/labman_pascal_voc/archive/test/annotations

# Class names.
CLASSES: [
    '__background__',
    'part',
    'tooling',
    'tooling_tag',
    'without-part'
]

# Number of classes (object classes + 1 for background class in Faster RCNN).
NC: 5

# Whether to save the predictions of the validation set while training.
SAVE_VALID_PREDICTION_IMAGES: True